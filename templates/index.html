<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>English Tests</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding: 50px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .btn { display: block; width: 80%; margin: 15px auto; padding: 15px; font-size: 18px; color: white; background-color: #007BFF; text-decoration: none; border-radius: 5px; transition: 0.3s; }
        .btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <button onclick="toggleTheme()" id="themeBtn" style="position: absolute; top: 20px; right: 20px; font-size: 24px; background: none; border: none; cursor: pointer;">🌓</button>
    <div class="container" id="mainContainer">
        <h1>English Language Tests</h1>
        <p>Choose a student testing module:</p>
        <a href="/test/yevhen" class="btn">Test: Yevhen</a>
        <a href="/test/nikita" class="btn">Test: Nikita</a>
        <a href="/test/sasha" class="btn">Test: Oleksandr (Sasha)</a>
        <a href="/test/denis" class="btn">Test: Denis</a>
        <a href="/test/illia" class="btn">Test: Illia</a>
        
        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #ddd;" id="separator">
        <a href="/results" class="btn" style="background-color: #28a745;">📋 View Results</a>
    </div>

    <script>
        function applyTheme(isDark) {
            const body = document.body;
            const container = document.getElementById('mainContainer');
            const h1 = document.querySelector('h1');
            const p = document.querySelector('p');
            
            if (isDark) {
                body.style.backgroundColor = '#121212';
                container.style.backgroundColor = '#1e1e1e';
                container.style.boxShadow = '0 4px 8px rgba(255,255,255,0.05)';
                h1.style.color = '#ffffff';
                p.style.color = '#cccccc';
            } else {
                body.style.backgroundColor = '#f4f4f9';
                container.style.backgroundColor = 'white';
                container.style.boxShadow = '0 4px 8px rgba(0,0,0,0.1)';
                h1.style.color = '#333';
                p.style.color = '#000000';
            }
        }

        function toggleTheme() {
            let currentTheme = localStorage.getItem('theme') || 'light';
            let newTheme = currentTheme === 'light' ? 'dark' : 'light';
            localStorage.setItem('theme', newTheme);
            applyTheme(newTheme === 'dark');
        }

        // Apply on load
        if (localStorage.getItem('theme') === 'dark') {
            applyTheme(true);
        }
    </script>
</body>
</html>
